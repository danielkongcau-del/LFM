model:
  base_learning_rate: 1.0e-4
  target: ldm.models.worm_maskgit.WormMaskTokenPrior
  params:
    monitor: val/loss
    vocab_size: 128
    grid_size: 32
    embed_dim: 256
    n_heads: 8
    n_layers: 8
    dropout: 0.1
    mask_schedule_type: cosine
    label_smoothing: 0.0
    weight_decay: 0.01
    sample_steps: 24
    sample_topk: 64
    sample_softmax_temp: 1.2
    sample_gumbel_temp: 4.5
    sample_token_weight_alpha: 0.0
    sample_token_logits_alpha: 0.15
    sample_token_confidence_alpha: 1.0
    tokenizer_config: configs/autoencoder/worm-mask-vq.yaml
    tokenizer_ckpt:
    token_weight_path:
    token_weight_power: 0.5
    token_weight_min: 0.25
    token_weight_max: 4.0
    log_reconstruction_mask_ratio: 0.5

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 16
    num_workers: 8
    wrap: false
    train:
      target: ldm.data.worm.WormMaskTokenCache
      params:
        root: data/worm-mask-vq-tokens/train
        use_flip: true
    validation:
      target: ldm.data.worm.WormMaskTokenCache
      params:
        root: data/worm-mask-vq-tokens/val
        use_flip: false

lightning:
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 500
        max_images: 4
        increase_log_steps: false

  trainer:
    benchmark: true
